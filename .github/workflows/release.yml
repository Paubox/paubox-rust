name: Publish

# Publishes to crates.io when a version tag is pushed, e.g. `v0.1.0`.
#
# Uses crates.io Trusted Publishing (GitHub OIDC) so no long-lived
# CARGO_REGISTRY_TOKEN secret is stored. The crate is owned by the
# `Paubox/engineering` GitHub team; configure the trusted publisher at
# crates.io → crate Settings → Trusted Publishing with:
#   owner: Paubox   repo: paubox-rust   workflow: release.yml   environment: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for crates.io Trusted Publishing (OIDC)

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify the crate before publishing
        run: |
          cargo fmt --all --check
          cargo test --all-features
          cargo publish --dry-run

      - name: Mint a short-lived crates.io token (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
